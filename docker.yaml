- task: Docker@2
    displayName: 'Docker Push'
    inputs:
      command: push
      containerRegistry: '${{ parameters.gcrServiceConnection }}'
      repository: '${{ parameters.devProject }}/${{ parameters.artifactRepo }}/${{ parameters.dockerImageName }}'
      tags: |
        $(Build.BuildNumber)
        $(Build.SourceVersion)

  # --- Authenticate as the deployer SA for signing/attestation steps below ---
  - template: ./download-sa-key.yaml
    parameters:
      secureFileName: 'cdhs-ebt-azdo-cloud-run-deployer.json'

  - script: |
      set -eo pipefail
      gcloud auth activate-service-account azdo-cloud-run-deployer@cdhs-ebt-cicd.iam.gserviceaccount.com \
        --project cdhs-ebt-cicd \
        --key-file $(authkey.secureFilePath)
      gcloud auth configure-docker us-central1-docker.pkg.dev --quiet
    displayName: 'Authenticate deployer SA'

  # --- SBOM generation ---
  - script: |
      set -eo pipefail
      curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
      IMAGE="us-central1-docker.pkg.dev/${{ parameters.devProject }}/${{ parameters.artifactRepo }}/${{ parameters.dockerImageName }}:$(Build.BuildNumber)"
      syft "$IMAGE" -o spdx-json > $(Build.ArtifactStagingDirectory)/sbom-$(Build.BuildNumber).spdx.json
      echo "SBOM generated for $IMAGE"
    displayName: 'Generate SBOM'

  - task: PublishBuildArtifacts@1
    inputs:
      pathToPublish: '$(Build.ArtifactStagingDirectory)/sbom-$(Build.BuildNumber).spdx.json'
      artifactName: 'sbom'
    displayName: 'Publish SBOM artifact'

  # --- Install cosign ---
  - script: |
      set -eo pipefail
      curl -sSfL -o /usr/local/bin/cosign https://github.com/sigstore/cosign/releases/latest/download/cosign-linux-amd64
      chmod +x /usr/local/bin/cosign
      cosign version
    displayName: 'Install cosign'

  # --- Sign the image using the cicd KMS key ---
  - script: |
      set -eo pipefail
      IMAGE="us-central1-docker.pkg.dev/${{ parameters.devProject }}/${{ parameters.artifactRepo }}/${{ parameters.dockerImageName }}:$(Build.BuildNumber)"
      cosign sign --key gcpkms://projects/cdhs-ebt-cicd/locations/us-central1/keyRings/attestor-keyring/cryptoKeys/image-signing-key/cryptoKeyVersions/1 "$IMAGE" -y
    displayName: 'Sign image with cosign'

  # --- Create the Binary Authorization attestation ---
  - script: |
      set -eo pipefail
      IMAGE="us-central1-docker.pkg.dev/${{ parameters.devProject }}/${{ parameters.artifactRepo }}/${{ parameters.dockerImageName }}:$(Build.BuildNumber)"
      DIGEST=$(gcloud artifacts docker images describe "$IMAGE" --format='get(image_summary.digest)' --project ${{ parameters.devProject }})

      gcloud container binauthz attestations sign-and-create \
        --project=cdhs-ebt-cicd \
        --artifact-url="us-central1-docker.pkg.dev/${{ parameters.devProject }}/${{ parameters.artifactRepo }}/${{ parameters.dockerImageName }}@${DIGEST}" \
        --attestor=ebt-build-attestor \
        --attestor-project=cdhs-ebt-cicd \
        --keyversion=1 \
        --keyversion-key=image-signing-key \
        --keyversion-keyring=attestor-keyring \
        --keyversion-location=us-central1 \
        --keyversion-project=cdhs-ebt-cicd

      echo "Attestation created for digest $DIGEST"
    displayName: 'Create Binary Authorization attestation'